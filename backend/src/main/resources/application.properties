# ==============================
# Server Configuration
# ==============================
server.port=8080

# ==============================
# MySQL Database Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/hellotalk_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${MySQL.password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Configuration
# =============================
app.jwt.secret=${JWT SECRET KEY}
app.jwt.expiration-ms=86400000

# ==============================
# Mail Configuration (Gmail SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${Gmail}
spring.mail.password=${gmail 16 digit code }
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OTP expiry in minutes
app.otp.expiry-minutes=10

# ==============================
# CORS
# ==============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ==============================
# Logging
# ==============================
logging.level.com.hellotalk=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.socket=DEBUG
